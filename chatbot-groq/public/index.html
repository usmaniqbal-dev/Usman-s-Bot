<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Groq AI Chatbot</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="chat-shell">
    <section class="chat-panel" aria-label="AI chatbot">
      <header class="chat-header">
        <div>
          <p class="eyebrow">Groq Cloud</p>
          <h1>AI Chatbot</h1>
        </div>
        <button class="clear-button" id="clearChat" type="button">Clear chat</button>
      </header>

      <div class="messages" id="messages" aria-live="polite">
        <article class="message bot">
          <div class="avatar">AI</div>
          <div class="bubble">Hi! Ask me anything and I will reply using Groq.</div>
        </article>
      </div>

      <form class="composer" id="chatForm">
        <textarea
          id="messageInput"
          autocomplete="off"
          placeholder="Type your message..."
          aria-label="Type your message"
          rows="1"
          required
        ></textarea>
        <button id="sendButton" type="submit">Send</button>
      </form>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
